name: Release Desktop Agent

# Standalone desktop repo: package.json lives at the repository root (no desktop/ subfolder).
# For monorepo layouts (frontend/backend/desktop), use ../.github/workflows/release-desktop.yml instead.

on:
  push:
    tags:
      - 'v*'

env:
  AWS_REGION: ap-south-1
  S3_UPDATE_BUCKET: lms-app-storage-steora

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build and package (Windows NSIS installer)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ env.AWS_REGION }}
          ENTERPRISE_API_URL: ${{ secrets.ENTERPRISE_API_URL }}
        run: npm run build:win -- --publish always

      - name: Upload installer artifact to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: EnterpriseAgentSetup-${{ github.ref_name }}
          path: |
            dist/EnterpriseAgentSetup-*.exe
            dist/latest.yml

  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    if: false

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build:mac -- --publish always
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ env.AWS_REGION }}
